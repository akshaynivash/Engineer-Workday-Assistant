name: Backend CI

on:
  push:
    branches: [master]
    paths: ["backend/**"]
  pull_request:
    branches: [master]
    paths: ["backend/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest
